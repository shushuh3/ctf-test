services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cft
      POSTGRES_PASSWORD: cft_password
      POSTGRES_DB: cft
    ports:
      - '5432:5432'
    volumes:
      - cft_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cft -d cft']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cft:cft_password@db:5432/cft?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-change_me}
      AUTH_TRUST_HOST: 'true'
      NODE_ENV: production
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    profiles: ['app']

volumes:
  cft_postgres_data:
